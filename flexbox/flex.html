<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        padding: 20px;
        line-height: 1.6;
        background-color: #584444;
      }
      h1,
      h2 {
        align-items: center;
        text-align: center;
        color: rgb(120, 116, 110);
      }
      .container {
        max-width: 800px;
        margin: auto;
        background: #c2b6b6;
        padding: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      .box {
        width: 100px;
        height: 100px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        color: #2f0909;
        margin: 10px;
        border-radius: 8px;
      }
 
      .pastel-1 {
        background-color: hsla(268, 22%, 55%, 0.833);
      }
      .pastel-2 {
        background-color: hsla(268, 22%, 55%, 0.833);
      }
      .pastel-3 {
        background-color: hsla(268, 22%, 55%, 0.833);
      }
      .pastel-4 {
        background-color: hsla(268, 22%, 55%, 0.833);
      }
      .pastel-5 {
        background-color: hsla(268, 22%, 55%, 0.833);
      }
    </style>
  </head>

  <body>
    <h1>Flexbox Parent Properties</h1>

    <div class="container">
      <h2>1. boxes</h2>
      <div class="Flexbox">
        <div class="box pastel-1">1</div>
        <div class="box pastel-2">2</div>
        <div class="box pastel-3">3</div>
        <div class="box pastel-4">4</div>
        <div class="box pastel-5">5</div>
      </div>
    </div>
  </body>
</html>
