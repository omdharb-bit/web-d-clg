<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe UI</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#1e1e2f;
    }

    .container{
      text-align:center;
    }

    h1{
      color:white;
      margin-bottom:20px;
      letter-spacing:2px;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(3,100px);
      gap:10px;
    }

    .cell{
      width:100px;
      height:100px;
      border:none;
      border-radius:12px;
      background:white;
      font-size:2rem;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    .cell:hover{
      background:#dcdcff;
      transform:scale(1.05);
    }

    .reset{
      margin-top:20px;
      padding:10px 20px;
      border:none;
      border-radius:8px;
      background:#4f46e5;
      color:white;
      font-size:1rem;
      cursor:pointer;
      transition:0.2s;
    }

    .reset:hover{
      background:#4338ca;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>TIC TAC TOE</h1>

    <div class="board">
      <button class="cell"></button>
      <button class="cell"></button>
      <button class="cell"></button>

      <button class="cell"></button>
      <button class="cell"></button>
      <button class="cell"></button>

      <button class="cell"></button>
      <button class="cell"></button>
      <button class="cell"></button>
    </div>

  <h2 id="msg"></h2>

    <button class="reset">Reset Game</button>
  </div>

<script src="index.js"></script>
</body>
</html>
